<!DOCTYPE html>
<html>
    <body>
        <div id="main">
        </div>
    </body>
    <script>
        const main = document.getElementById("main");
        const textbox = document.createElement("p");
        textbox.textContent = "Chargement...";
        main.appendChild(textbox);
    
        let inputs = null; let iptBox = null;
        google.script.run
            .withSuccessHandler(fetchSuccessHandler)
            .withFailureHandler(fetchErrorHandler)
            .get_html_colors();

        function generateError(text) {
            const p = document.createElement("p");
            p.textContent = text;
            main.appendChild(p);
        }

        function btnHandler() {
            google.script.run
                .withSuccessHandler(()=>google.script.host.close())
                .withFailureHandler(setErrorHandler)
                .save_colors(inputs.map(((x)=>x.value)).join(";"));
            textbox.textContent = "Sauvegarde...";
            if (iptBox) {
                iptBox.remove();
            } 
        }

        function setErrorHandler(err) {
            generateError("ERROR: Failed to set new colors -- " + err);
        }

        function fetchSuccessHandler(colors) {
            if (
                colors.victory === undefined || 
                colors.defeat === undefined ||
                colors.label === undefined ||
                colors.empty === undefined ||
                colors._void === undefined
            ) {
                generateError("ERROR: Received colors object is missing properties");
            } else {
                const outerDiv = document.createElement("div");

                inputs = [
                    {label: "Couleur du GOAT", value: colors.victory}, 
                    {label: "Couleur des Skill Issue", value: colors.defeat}, 
                    {label: "Couleur de la case neutre", value: colors._void}, 
                    {label: "Couleur d'une cellule de texte", value: colors.label}, 
                    {label: "Couleur d'une cellule 'x'", value: colors.empty}
                ].map((x,i)=>{
                    const div = document.createElement("div");
                    const ipt = document.createElement("input");
                    const label = document.createElement("label");

                    ipt.type = "color"; ipt.name = i; ipt.value = x.value;
                    label.for = i; label.textContent = x.label;
                    textbox.textContent = "Remarque: vous devrez mettre à jour les données pour utiliser les nouvelles couleurs."
                    div.appendChild(ipt); div.appendChild(label); outerDiv.appendChild(div);
                    iptBox = div;
                    return ipt;
                });
                const div = document.createElement("div");
                div.style.width = "100%"; div.style.display = "flex"; div.style.justifyContent = "center";
                
                const btn = document.createElement("btn");
                btn.textContent = "Enregistrer";
                btn.onclick = btnHandler;
                div.appendChild(btn);

                outerDiv.appendChild(div);
                main.appendChild(outerDiv);
                iptBox = outerDiv;

                main.appendChild(outerDiv);
            }
        } function fetchErrorHandler(err) {
            generateError("ERROR: Failed to fetch current colors -- " + err);
        }
    </script>
    <style>
        input {
            margin: 3%;
        } btn:hover {
            cursor: pointer;
        } btn {
            background-color: #f1dd68;
            border: solid 2px;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</html>
